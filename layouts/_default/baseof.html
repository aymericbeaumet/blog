<!doctype html>
<html lang="en" prefix="og: https://ogp.me/ns#">
	<head>
		{{ partial "head.html" . }}
	</head>
	<body>
		<div class="layout">
			{{ partial "header.html" . }}

			<main>
				{{ block "main" . }}{{ end }}
			</main>

			{{ partial "footer.html" . }}
			{{ partial "mobile-nav.html" . }}
		</div>
		<script src="{{ "js/prism.js" | relURL }}"></script>
		<script>
			if (window.Prism) {
				Prism.hooks.add('complete', (env) => {
					if (env.language !== 'bash') {
						return;
					}
					env.element.querySelectorAll('.token.parameter').forEach((node) => {
						node.replaceWith(node.textContent);
					});
					env.element.normalize();
				});
			}
		</script>
	</body>
</html>
